<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Engelden Kaç</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  font-family:'Press Start 2P', cursive;
  touch-action:none;
}

/* MENÜ */
#menu {
  position:absolute;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
  color:white;
}

#title {
  font-size:20px;
  margin-bottom:40px;
}

#startBtn {
  padding:15px 30px;
  font-size:14px;
  background:lime;
  border:none;
}

/* PLAYER */
#player {
  width:48px;
  height:48px;
  position:absolute;
  bottom:20px;
  left:50%;
  display:none;
  image-rendering:pixelated;
  background:img src=("img/character.png") no-repeat center/cover;
  animation:idle 0.6s infinite alternate;
}

/* OBJELER */
.obj { position:absolute; top:0; }

.spike {
  width:32px; height:32px;
  background:url("https://i.imgur.com/tV6GQ9B.png") no-repeat center/cover;
  image-rendering:pixelated;
}

.coin {
  width:28px; height:28px;
  background:url("https://i.imgur.com/8Qf6FZC.png") no-repeat center/cover;
  image-rendering:pixelated;
  animation:spin 0.5s infinite linear;
}

.heart {
  width:28px; height:28px;
  background:url("https://i.imgur.com/3ZQ3Z9H.png") no-repeat center/cover;
  image-rendering:pixelated;
}

/* UI */
#ui {
  position:fixed;
  top:10px; left:10px;
  color:white;
  display:none;
  font-size:10px;
}

/* GAME OVER */
#gameOver {
  position:absolute;
  width:100%; height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:black;
}

#gameOverText {
  color:red;
  font-size:20px;
}

#restartBtn {
  margin-top:30px;
  padding:10px 20px;
  background:red;
  color:white;
  border:none;
}

/* ANIMASYON */
@keyframes spin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}

@keyframes idle {
  from { transform:translateY(0); }
  to { transform:translateY(-4px); }
}
</style>
</head>

<body>

<div id="menu">
  <div id="title">ENGELDEN KAÇ</div>
  <button id="startBtn">OYUNA BAŞLA</button>
</div>

<div id="gameOver">
  <div id="gameOverText">GAME OVER</div>
  <button id="restartBtn">TEKRAR DENE</button>
</div>

<div id="player"></div>
<div id="ui"></div>

<audio id="coinSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="hitSound" src="https://actions.google.com/sounds/v1/impacts/crash.ogg"></audio>
<audio id="heartSound" src="https://actions.google.com/sounds/v1/cartoon/slide_whistle_to_drum_hit.ogg"></audio>

<script>
let player = document.getElementById("player");
let can, skor, hiz;
let oyunBasladi = false;

let highScore = localStorage.getItem("hs") || 0;

/* YUMUŞAK KONTROL */
let targetX = window.innerWidth/2;
let currentX = targetX;

document.addEventListener("touchmove", e=>{
  targetX = e.touches[0].clientX;
});

function updatePlayer(){
  currentX += (targetX - currentX)*0.2;
  player.style.left = currentX + "px";
  requestAnimationFrame(updatePlayer);
}
updatePlayer();

/* PARTICLE */
function particle(x,y,color){
  for(let i=0;i<6;i++){
    let p = document.createElement("div");
    p.style.position="absolute";
    p.style.width="6px";
    p.style.height="6px";
    p.style.background=color;
    p.style.left=x+"px";
    p.style.top=y+"px";
    document.body.appendChild(p);

    let dx=(Math.random()-0.5)*6;
    let dy=(Math.random()-0.5)*6;
    let life=20;

    let anim=setInterval(()=>{
      life--;
      x+=dx;
      y+=dy;
      p.style.left=x+"px";
      p.style.top=y+"px";
      p.style.opacity=life/20;

      if(life<=0){
        p.remove();
        clearInterval(anim);
      }
    },20);
  }
}

/* START */
document.getElementById("startBtn").onclick=()=>{
  document.getElementById("menu").style.display="none";
  player.style.display="block";
  document.getElementById("ui").style.display="block";

  can=3;
  skor=0;
  hiz=2;
  oyunBasladi=true;

  spawnLoop();
  gameLoop();
};

document.getElementById("restartBtn").onclick=()=>location.reload();

/* SPAWN */
function spawnLoop(){
  setInterval(()=>{
    if(!oyunBasladi) return;

    let obj=document.createElement("div");
    obj.classList.add("obj");

    let r=Math.random();

    if(r<0.65) obj.classList.add("spike");
    else if(r<0.95) obj.classList.add("coin");
    else obj.classList.add("heart");

    obj.style.left=Math.random()*window.innerWidth+"px";
    obj.style.transform="rotate("+(Math.random()*20-10)+"deg)";

    document.body.appendChild(obj);

    let y=0;

    let fall=setInterval(()=>{
      y+=hiz;
      obj.style.top=y+"px";

      let r1=obj.getBoundingClientRect();
      let r2=player.getBoundingClientRect();

      if(r1.bottom>r2.top && r1.left<r2.right && r1.right>r2.left){

        if(obj.classList.contains("spike")){
          can--;
          hitSound.currentTime=0;
          hitSound.play();
          particle(r1.left,r1.top,"red");
        }

        if(obj.classList.contains("coin")){
          skor+=20;
          coinSound.currentTime=0;
          coinSound.play();
          particle(r1.left,r1.top,"yellow");
        }

        if(obj.classList.contains("heart")){
          if(can<5) can++;
          heartSound.currentTime=0;
          heartSound.play();
          particle(r1.left,r1.top,"pink");
        }

        obj.remove();
        clearInterval(fall);
      }

      if(y>window.innerHeight){
        obj.remove();
        clearInterval(fall);
      }

    },20);

  },800);
}

/* GAME LOOP */
function gameLoop(){
  setInterval(()=>{
    if(!oyunBasladi) return;

    skor++;
    hiz+=0.01;

    if(skor>highScore){
      highScore=skor;
      localStorage.setItem("hs",highScore);
    }

    document.getElementById("ui").innerText=
      "CAN:"+can+" SKOR:"+skor+" HS:"+highScore;

    document.body.style.background=
      "hsl("+(skor%360)+",60%,10%)";

    if(can<=0){
      oyunBasladi=false;
      document.getElementById("gameOver").style.display="flex";
    }

  },100);
}
</script>

</body>
</html>
